<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" viewBox="0 0 960 560"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path fill="#3d3d3d" d="M0,0 L10,5 L0,10 Z"/></marker><style>.actor{fill:#f9f9fb;stroke:#6b7280}.actor,.asset,.component{stroke-width:1.5}.component{fill:#fff;stroke:#3d3d3d}.asset{fill:#fef3c7;stroke:#92400e}.external{fill:#f3f4f6;stroke:#6b7280;stroke-dasharray:5 4}.boundary{fill:none;stroke:#9ca3af;stroke-dasharray:6 5}.label{font-size:14px;fill:#111827}.small,.threat{font-size:12px;fill:#374151}.threat{fill:#7c2d12}.flow{stroke:#3d3d3d;stroke-width:1.4;marker-end:url(#arrow)}</style></defs><rect width="460" height="420" x="250" y="60" class="boundary" rx="14"/><text x="480" y="45" class="small" text-anchor="middle">Server-side system (trust boundary) (E2)</text><rect width="160" height="64" x="40" y="260" class="actor" rx="8"/><text x="120" y="288" class="label" text-anchor="middle">User (S1-S4)</text><text x="120" y="306" class="small" text-anchor="middle">Web browser (E1)</text><rect width="380" height="70" x="290" y="100" class="component" rx="10"/><text x="480" y="130" class="label" text-anchor="middle">Web server with blog software (C1)</text><text x="480" y="150" class="threat" text-anchor="middle">T5 DoS</text><rect width="380" height="70" x="290" y="190" class="component" rx="10"/><text x="480" y="220" class="label" text-anchor="middle">Authentication system (C2)</text><text x="480" y="240" class="threat" text-anchor="middle">T2 Account takeover</text><rect width="380" height="70" x="290" y="280" class="component" rx="10"/><text x="480" y="310" class="label" text-anchor="middle">User-submitted content systems (C3, C4)</text><text x="480" y="330" class="threat" text-anchor="middle">T1 XSS · T3 Spam</text><rect width="380" height="70" x="290" y="370" class="component" rx="10"/><text x="480" y="400" class="label" text-anchor="middle">Third-party script loader (C5)</text><text x="480" y="420" class="threat" text-anchor="middle">T4 Data leakage</text><rect width="300" height="60" x="330" y="460" class="asset" rx="8"/><text x="480" y="490" class="label" text-anchor="middle">User Data (A1–A5)</text><text x="480" y="508" class="threat" text-anchor="middle">T4 Information disclosure</text><rect width="180" height="80" x="750" y="260" class="external" rx="10"/><text x="840" y="295" class="label" text-anchor="middle">Third-party services (E3)</text><text x="840" y="315" class="small" text-anchor="middle">Analytics, embeds</text><line x1="200" x2="290" y1="292" y2="135" class="flow"/><text x="210" y="190" class="small">F3 Page rendering</text><line x1="200" x2="290" y1="292" y2="225" class="flow"/><text x="210" y="255" class="small">F1 Authentication</text><line x1="200" x2="290" y1="292" y2="315" class="flow"/><text x="210" y="330" class="small">F2 / F4 Submission</text><line x1="670" x2="750" y1="405" y2="300" class="flow"/><text x="713" y="369" class="small">F5 Track page views</text><text x="713" y="389" class="small">F6 Load external data</text></svg>